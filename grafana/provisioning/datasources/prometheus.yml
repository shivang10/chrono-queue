apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: true
    # Prevent operators from modifying the provisioned config via the UI.
    editable: false
    version: 1
    jsonData:
      # Must match global.scrape_interval in prometheus.yml (15s).
      timeInterval: "15s"
      httpMethod: POST
