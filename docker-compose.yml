services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - chrono-queue-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS}
    networks:
      - chrono-queue-network
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - chrono-queue-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chrono-queue-network
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    hostname: mongodb
    container_name: mongodb
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    command: [ "--bind_ip_all" ]
    volumes:
      - mongo-data:/data/db
    networks:
      - chrono-queue-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password
            $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval
            'db.adminCommand(\"ping\").ok' | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  job-producer:
    build:
      context: .
      dockerfile: job-producer/Dockerfile
    container_name: job-producer
    ports:
      - "${JOB_PRODUCER_PORT}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    labels:
      environment: "production"
    depends_on:
      kafka:
        condition: service_healthy
    init: true
    healthcheck:
      test: "wget -qO- http://localhost:$$SERVER_PORT/actuator/health"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chrono-queue-network
    restart: unless-stopped

  job-worker:
    build:
      context: .
      dockerfile: job-worker/Dockerfile
    container_name: job-worker
    ports:
      - "${JOB_WORKER_PORT}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    labels:
      environment: "production"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      job-producer:
        condition: service_healthy
    init: true
    healthcheck:
      test: "wget -qO- http://localhost:$$SERVER_PORT/actuator/health"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chrono-queue-network
    restart: unless-stopped

  retry-dispatcher:
    build:
      context: .
      dockerfile: retry-dispatcher/Dockerfile
    container_name: retry-dispatcher
    ports:
      - "${RETRY_DISPATCHER_PORT}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    labels:
      environment: "production"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      job-producer:
        condition: service_healthy
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8083/actuator/health >/dev/null || exit
            1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chrono-queue-network
    restart: unless-stopped

  dlq:
    build:
      context: .
      dockerfile: dlq/Dockerfile
    container_name: dlq
    ports:
      - "${DLQ_PORT}:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USER}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SPRING_DATA_MONGODB_AUTH_DB: admin
    labels:
      environment: "production"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      job-producer:
        condition: service_healthy
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8084/actuator/health >/dev/null || exit
            1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chrono-queue-network
    restart: unless-stopped

  # Prometheus for metrics scraping
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-recording-rules.yml:/etc/prometheus/prometheus-recording-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chrono-queue-network
    restart: unless-stopped

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - chrono-queue-network
    restart: unless-stopped

  # Promtail for log shipping
  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - chrono-queue-network
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - chrono-queue-network
    restart: unless-stopped

networks:
  chrono-queue-network:
    driver: bridge

volumes:
  mongo-data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
