spring:
  application:
    name: job-producer

  # ── Graceful Shutdown ──────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 45s

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      client-id: ${HOSTNAME:job-producer}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

      acks: all
      retries: 10000
      batch-size: 65536
      buffer-memory: 67108864
      properties:
        '[enable.idempotence]': true
        '[max.in.flight.requests.per.connection]': 5
        '[compression.type]': zstd
        '[linger.ms]': 15
        '[request.timeout.ms]': 30000
        '[delivery.timeout.ms]': 120000
        '[retry.backoff.ms]': 100
        '[reconnect.backoff.max.ms]': 5000
        '[metadata.max.age.ms]': 300000
    template:
      observation-enabled: true

chrono:
  kafka:
    topic-management:
      enabled: ${CHRONO_KAFKA_TOPIC_MANAGEMENT_ENABLED:true}
      default-partitions: ${CHRONO_KAFKA_TOPIC_DEFAULT_PARTITIONS:3}
      replication-factor: ${CHRONO_KAFKA_TOPIC_REPLICATION_FACTOR:1}
      partitions:
        webhook-jobs: ${CHRONO_KAFKA_TOPIC_WEBHOOK_PARTITIONS:6}
        email-jobs: ${CHRONO_KAFKA_TOPIC_EMAIL_PARTITIONS:6}
        payment-processing-jobs: ${CHRONO_KAFKA_TOPIC_PAYMENT_PARTITIONS:12}
        order-cancellation-jobs: ${CHRONO_KAFKA_TOPIC_ORDER_CANCELLATION_PARTITIONS:3}
        job-dlq: ${CHRONO_KAFKA_TOPIC_DLQ_PARTITIONS:3}

# ── Server ─────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  compression:
    enabled: true

# ── Actuator / Observability ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
        '[jvm.gc.pause]': true
        '[spring.kafka.template]': true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    '[com.chrono.producer]': INFO
    '[org.springframework.kafka]': WARN
    '[org.apache.kafka]': WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"

# ── Spring Doc OpenAPI ─────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
