global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "prometheus-recording-rules.yml"

scrape_configs:
  - job_name: "job-producer"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "job-producer:8081" ]
        labels:
          service: "job-producer"

  - job_name: "job-worker"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "job-worker:8082" ]
        labels:
          service: "job-worker"

  - job_name: "retry-dispatcher"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "retry-dispatcher:8083" ]
        labels:
          service: "retry-dispatcher"

  - job_name: "dlq-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "dlq:8084" ]
        labels:
          service: "dlq-service"

  - job_name: "redis-exporter"
    static_configs:
      - targets: [ "redis-exporter:9121" ]
        labels:
          service: "redis"
