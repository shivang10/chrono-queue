spring:
  application:
    name: dlq-service

  # ── Graceful Shutdown ──────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: ${LIFECYCLE_SHUTDOWN_TIMEOUT:90s}

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:dlq-group}
      client-id: ${spring.application.name}-${HOSTNAME:local}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 250
      properties:
        '[isolation.level]': read_committed
        '[heartbeat.interval.ms]': 10000
        '[session.timeout.ms]': 60000
        '[max.poll.interval.ms]': 300000
        '[fetch.max.bytes]': 10485760
        '[fetch.min.bytes]': 4096
        '[fetch.max.wait.ms]': 50
        '[max.partition.fetch.bytes]': 1048576
        '[allow.auto.create.topics]': false
        '[retry.backoff.ms]': 100
        '[retry.backoff.max.ms]': 5000

    listener:
      type: batch
      missing-topics-fatal: ${KAFKA_MISSING_TOPICS_FATAL:true}
      ack-mode: manual_immediate
      observation-enabled: true
      poll-timeout: 2000
    template:
      observation-enabled: true

  # ── MongoDB ────────────────────────────────────────────────
  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:mongodb}
      port: ${SPRING_DATA_MONGODB_PORT:27017}
      database: ${SPRING_DATA_MONGODB_DATABASE:dlq_db}
      username: ${SPRING_DATA_MONGODB_USERNAME:admin}
      password: ${SPRING_DATA_MONGODB_PASSWORD:password}
      authentication-database: ${SPRING_DATA_MONGODB_AUTH_DB:admin}
# ── Server ─────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful


dlq:
  kafka:
    concurrency:
      dlq-concurrency: ${DLQ_CONCURRENCY:3}

# ── Actuator / Observability ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    kafka:
      enabled: true
    mongo:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
        '[jvm.gc.pause]': true
        '[spring.kafka.listener]': true
        '[mongodb.driver.commands]': true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    '[com.chrono.dlq]': INFO
    '[org.springframework.kafka]': WARN
    '[org.apache.kafka]': WARN
    '[org.mongodb.driver]': WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
