spring:
  application:
    name: job-worker

  # ── Graceful Shutdown ──────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: ${LIFECYCLE_SHUTDOWN_TIMEOUT:90s}

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:job-worker-group}
      client-id: ${spring.application.name}-${HOSTNAME:job-worker}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      properties:
        '[isolation.level]': read_committed
        '[heartbeat.interval.ms]': 10000
        '[session.timeout.ms]': 60000
        '[max.poll.interval.ms]': 300000
        '[fetch.max.bytes]': 52428800
        '[fetch.min.bytes]': 1024
        '[fetch.max.wait.ms]': 100
        '[max.partition.fetch.bytes]': 1048576
        '[allow.auto.create.topics]': false
        '[retry.backoff.ms]': 100
        '[retry.backoff.max.ms]': 5000

    producer:
      client-id: ${HOSTNAME:job-worker-dlq-producer}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

      acks: all
      retries: 10000
      buffer-memory: 67108864
      batch-size: 65536
      properties:
        '[enable.idempotence]': true
        '[max.in.flight.requests.per.connection]': 5
        '[delivery.timeout.ms]': 120000
        '[linger.ms]': 10
        '[request.timeout.ms]': 30000
        '[retry.backoff.ms]': 100
        '[retry.backoff.max.ms]': 5000
        '[reconnect.backoff.max.ms]': 5000
        '[metadata.max.age.ms]': 300000
        '[compression.type]': zstd
        '[max.block.ms]': 10000
    listener:
      missing-topics-fatal: ${KAFKA_MISSING_TOPICS_FATAL:true}
      ack-mode: manual_immediate
      observation-enabled: true
      type: single
      poll-timeout: 3000
    template:
      observation-enabled: true

  # ── Redis ──────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

# ── Server ─────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

# ── Custom Application Properties ──────────────────────────
retry:
  policy:
    max-retries: ${RETRY_POLICY_MAX_RETRIES:3}
    initial-delay: ${RETRY_POLICY_INITIAL_DELAY:5000}
    multiplier: ${RETRY_POLICY_MULTIPLIER:2.0}
    max-delay: ${RETRY_POLICY_MAX_DELAY:300000}

worker:
  validation:
    simulated-failure-rate: ${WORKER_SIMULATED_FAILURE_RATE:0.5}
  kafka:
    concurrency:
      webhook-jobs: ${WEBHOOK_JOBS_CONCURRENCY:3}
      email-jobs: ${EMAIL_JOBS_CONCURRENCY:3}
      payment-processing-jobs: ${PAYMENT_PROCESSING_JOBS_CONCURRENCY:6}
      order-cancellation-jobs: ${ORDER_CANCELLATION_JOBS_CONCURRENCY:3}

# ── Actuator / Observability ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    kafka:
      enabled: true
    redis:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
        '[jvm.gc.pause]': true
        '[spring.kafka.listener]': true
        '[spring.kafka.template]': true
        '[lettuce.command]': true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# ── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    '[com.chrono.worker]': INFO
    '[org.springframework.kafka]': WARN
    '[org.apache.kafka]': WARN
    '[io.lettuce]': WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
