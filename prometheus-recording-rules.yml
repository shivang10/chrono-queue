groups:
  # ============================================================================
  # chrono-queue · Redis recording rules
  #
  # Evaluation interval: matches Prometheus global.evaluation_interval (15s).
  # Rate window: 5m — chosen to be ≥ 4× scrape_interval (15s) and provide a
  # stable, low-noise derivative for dashboards and alerts.
  #
  # Naming convention: chrono:<metric_basename>:<operation_and_window>
  # All rules aggregate by (instance, service) to match redis-exporter labels.
  # ============================================================================
  - name: chrono_redis_rate5m
    interval: 15s
    rules:

      # ── Throughput ────────────────────────────────────────────────────────
      - record: chrono:redis_commands_processed_total:rate5m
        expr: >-
          sum by (instance, service) (
            rate(redis_commands_processed_total[5m])
          )

      # ── Network I/O ───────────────────────────────────────────────────────
      - record: chrono:redis_net_input_bytes_total:rate5m
        expr: >-
          sum by (instance, service) (
            rate(redis_net_input_bytes_total[5m])
          )

      - record: chrono:redis_net_output_bytes_total:rate5m
        expr: >-
          sum by (instance, service) (
            rate(redis_net_output_bytes_total[5m])
          )

      # ── CPU utilisation ───────────────────────────────────────────────────
      # Total CPU % (sys + user) as a fraction of a single core.
      - record: chrono:redis_cpu_total_seconds:pct_rate5m
        expr: >-
          100 * sum by (instance, service) (
            rate(redis_cpu_sys_seconds_total[5m])
            + rate(redis_cpu_user_seconds_total[5m])
          )

      # User-space CPU % (single-core basis).
      - record: chrono:redis_cpu_user_seconds:pct_rate5m
        expr: >-
          100 * sum by (instance, service) (
            rate(redis_cpu_user_seconds_total[5m])
          )

      # Kernel-space CPU % (single-core basis).
      - record: chrono:redis_cpu_sys_seconds:pct_rate5m
        expr: >-
          100 * sum by (instance, service) (
            rate(redis_cpu_sys_seconds_total[5m])
          )

      # Core-normalised CPU %: falls back to single-core % when
      # machine_cpu_cores is not available (node_exporter absent).
      - record: chrono:redis_cpu_normalized:pct_rate5m
        expr: >-
          (
            100 * sum by (instance, service) (
              rate(redis_cpu_sys_seconds_total[5m])
              + rate(redis_cpu_user_seconds_total[5m])
            )
            / on(instance) group_left(service)
              clamp_min(max by (instance) (machine_cpu_cores), 1)
          ) or (
            100 * sum by (instance, service) (
              rate(redis_cpu_sys_seconds_total[5m])
              + rate(redis_cpu_user_seconds_total[5m])
            )
          )

      # ── Keyspace / cache efficiency ───────────────────────────────────────
      # Cache hit rate in % — clamped to [0, 100].
      # Uses clamp_min on the denominator to avoid division by zero on idle.
      - record: chrono:redis_keyspace_hit_rate:ratio_rate5m
        expr: >-
          clamp_max(
            clamp_min(
              100 * sum by (instance, service) (
                rate(redis_keyspace_hits_total[5m])
              )
              / clamp_min(
                  sum by (instance, service) (
                    rate(redis_keyspace_hits_total[5m])
                    + rate(redis_keyspace_misses_total[5m])
                  ),
                  1e-9
                ),
              0
            ),
            100
          )

      # Memory usage as % of configured maxmemory.
      # Instances with maxmemory=0 are excluded because they are unlimited.
      - record: chrono:redis_memory_usage:pct
        expr: >-
          100 * (
            sum by (instance, service) (
              redis_memory_used_bytes
              and on(instance, service) (redis_memory_max_bytes > 0)
            )
            /
            clamp_min(
              sum by (instance, service) (
                redis_memory_max_bytes
                and on(instance, service) (redis_memory_max_bytes > 0)
              ),
              1e-9
            )
          )

      # ── Evictions and expirations ─────────────────────────────────────────
      - record: chrono:redis_evicted_keys_total:rate5m
        expr: >-
          sum by (instance, service) (
            rate(redis_evicted_keys_total[5m])
          )

      - record: chrono:redis_expired_keys_total:rate5m
        expr: >-
          sum by (instance, service) (
            rate(redis_expired_keys_total[5m])
          )

      # ── Connection health ─────────────────────────────────────────────────
      - record: chrono:redis_rejected_connections_total:rate5m
        expr: >-
          sum by (instance, service) (
            rate(redis_rejected_connections_total[5m])
          )

  # ============================================================================
  # chrono-queue · HTTP server recording rules
  #
  # Service-level 5xx error ratio across all instrumented Spring Boot services.
  # ============================================================================
  - name: chrono_http_rate5m
    interval: 15s
    rules:

      - record: chrono:http_error_rate:ratio5m
        expr: >-
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) /
          clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 1e-9)

  # ============================================================================
  # chrono-queue · Lettuce (Spring Boot Redis client) recording rules
  #
  # Labels retained: service, instance, command — preserves full breakdown
  # for per-command analysis while eliminating repeated per-request rate work.
  # Changed from 'application' to 'service' to match Prometheus relabel strategy.
  # The _bucket rule keeps "le" so histogram_quantile() continues to work.
  # ============================================================================
  - name: chrono_lettuce_rate5m
    interval: 15s
    rules:

      # Pre-aggregated bucket sums — kept for ad-hoc / custom queries only.
      # Do NOT feed this into histogram_quantile in dashboard panels; use the
      # pre-computed p50/p95/p99 rules below instead.  rate() and increase() on
      # histogram buckets are computed independently per le series, so
      # floating-point extrapolation at window boundaries can produce
      # non-monotonic bucket sequences.  Prometheus detects this and emits
      # "input to histogram_quantile needs to be fixed for monotonicity".
      # Switching from rate to increase does NOT fix this — they are
      # proportional (increase = rate × window_seconds) so relative ordering
      # is identical.  The only true fix is to compute histogram_quantile
      # inside recording rules, where Prometheus corrects any non-monotonicity
      # before recording the scalar result.  Dashboard panels then consume
      # plain time series — no histogram_quantile call survives into Grafana.
      - record: chrono:lettuce_command_completion_seconds_bucket:increase5m
        expr: >-
          sum by (le, service, instance, command) (
            increase(lettuce_command_completion_seconds_bucket[5m])
          )

      # Pre-computed Lettuce latency quantiles — USE THESE in dashboard panels.
      # histogram_quantile is evaluated here inside Prometheus; any monotonicity
      # correction is applied at rule evaluation time and is invisible to Grafana.
      # Labels retained: {service, instance, command} — full drilldown still
      # works via Grafana template variable selectors.
      - record: chrono:lettuce_command_completion_p50_seconds:5m
        expr: >-
          histogram_quantile(0.50, sum by (le, service, instance, command) (
            rate(lettuce_command_completion_seconds_bucket[5m])
          ))

      - record: chrono:lettuce_command_completion_p95_seconds:5m
        expr: >-
          histogram_quantile(0.95, sum by (le, service, instance, command) (
            rate(lettuce_command_completion_seconds_bucket[5m])
          ))

      - record: chrono:lettuce_command_completion_p99_seconds:5m
        expr: >-
          histogram_quantile(0.99, sum by (le, service, instance, command) (
            rate(lettuce_command_completion_seconds_bucket[5m])
          ))

      # Per-command request count (throughput proxy)
      - record: chrono:lettuce_command_completion_seconds_count:rate5m
        expr: >-
          sum by (service, instance, command) (
            rate(lettuce_command_completion_seconds_count[5m])
          )

      # Per-command latency sum (divide by count for avg latency)
      - record: chrono:lettuce_command_completion_seconds_sum:rate5m
        expr: >-
          sum by (service, instance, command) (
            rate(lettuce_command_completion_seconds_sum[5m])
          )

      # First-response latency sum (time-to-first-byte from Redis)
      - record: chrono:lettuce_command_firstresponse_seconds_sum:rate5m
        expr: >-
          sum by (service, instance, command) (
            rate(lettuce_command_firstresponse_seconds_sum[5m])
          )

      # First-response latency count
      - record: chrono:lettuce_command_firstresponse_seconds_count:rate5m
        expr: >-
          sum by (service, instance, command) (
            rate(lettuce_command_firstresponse_seconds_count[5m])
          )

  # ============================================================================
  # chrono-queue · Retry Dispatcher recording rules
  #
  # Pre-aggregated rates and histogram quantiles for the retry-dispatcher
  # service. Eliminates per-query rate() computation in Grafana panels.
  #
  # Naming convention: chrono:<metric_basename>:<operation_and_window>
  # ============================================================================
  - name: chrono_retry_dispatcher_rate5m
    interval: 15s
    rules:

      # ── Poller throughput ─────────────────────────────────────────────────
      - record: chrono:retry_poller_dispatched_total:rate5m
        expr: >-
          sum by (service) (
            rate(retry_poller_dispatched_total[5m])
          )

      - record: chrono:retry_poller_polls_total:rate5m
        expr: >-
          sum by (service) (
            rate(retry_poller_polls_total[5m])
          )

      # ── Poller error rates ────────────────────────────────────────────────
      - record: chrono:retry_poller_deserialization_failures_total:rate5m
        expr: >-
          sum by (service) (
            rate(retry_poller_deserialization_failures_total[5m])
          )

      - record: chrono:retry_poller_skipped_total:rate5m
        expr: >-
          sum by (service) (
            rate(retry_poller_skipped_total[5m])
          )

      # ── Kafka producer success/failure ────────────────────────────────────
      - record: chrono:retry_producer_requeue_success_total:rate5m
        expr: >-
          sum by (service) (
            rate(retry_producer_requeue_success_total[5m])
          )

      - record: chrono:retry_producer_requeue_failure_total:rate5m
        expr: >-
          sum by (service) (
            rate(retry_producer_requeue_failure_total[5m])
          )

      # ── Poll duration quantiles ───────────────────────────────────────────
      # Pre-computed to avoid histogram_quantile monotonicity warnings in Grafana.
      - record: chrono:retry_poller_poll_duration_p50_seconds:5m
        expr: >-
          histogram_quantile(0.50, sum by (le, service) (
            rate(retry_poller_poll_duration_seconds_bucket[5m])
          ))

      - record: chrono:retry_poller_poll_duration_p90_seconds:5m
        expr: >-
          histogram_quantile(0.90, sum by (le, service) (
            rate(retry_poller_poll_duration_seconds_bucket[5m])
          ))

      - record: chrono:retry_poller_poll_duration_p95_seconds:5m
        expr: >-
          histogram_quantile(0.95, sum by (le, service) (
            rate(retry_poller_poll_duration_seconds_bucket[5m])
          ))

      - record: chrono:retry_poller_poll_duration_p99_seconds:5m
        expr: >-
          histogram_quantile(0.99, sum by (le, service) (
            rate(retry_poller_poll_duration_seconds_bucket[5m])
          ))

      # ── Derived: avg jobs per poll ────────────────────────────────────────
      - record: chrono:retry_poller_avg_jobs_per_poll:5m
        expr: >-
          (
            sum by (service) (rate(retry_poller_dispatched_total[5m]))
            / clamp_min(
                sum by (service) (rate(retry_poller_polls_total[5m])),
                1e-9
              )
          )
