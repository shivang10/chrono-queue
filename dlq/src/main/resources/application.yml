spring:
  application:
    name: dlq-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: dlq-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual
      observation-enabled: true
  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:mongodb}
      port: ${MONGODB_PORT:27017}
      database: dlq_db
      username: ${MONGODB_USER:admin}
      password: ${MONGODB_PASSWORD:password}

server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        jvm.gc.pause: true
        spring.kafka.listener: true
        mongodb.driver.commands: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# Logging Configuration
logging:
  level:
    root: INFO
    '[com.chrono.dlq]': INFO
    '[org.springframework.kafka]': WARN
    '[org.apache.kafka]': WARN
    '[org.mongodb.driver]': WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [${spring.application.name}] [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
