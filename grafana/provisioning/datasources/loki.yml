apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    isDefault: false
    # Prevent operators from modifying the provisioned config via the UI.
    editable: false
    version: 1
    jsonData:
      maxLines: 1000
      timeout: 60
